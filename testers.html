<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#faf8ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>테스터 관리 · SYA 앱</title>
</head>
<body>
<style>
  :root{
    color-scheme: light dark;
    --bg:#faf8ff; --surface:#ffffff; --surface2:#f4f0fc; --border:#e4ddf3;
    --text:#241a3a; --muted:#6b6480; --faint:#8c85a0;
    --accent:#5b3fa8; --accent-ink:#ffffff; --accent-weak:#ece6fb;
    --ok:#1c6f47; --ok-bg:#e4f5ec; --ok-bd:#a6d8bd;
    --warn:#8a5500; --warn-bg:#fdf2dd; --warn-bd:#eed3a0;
    --bad:#a8323c; --bad-bg:#fbe4e7; --bad-bd:#efb2b9;
    --shadow:0 1px 2px rgba(40,20,70,.05),0 6px 20px rgba(40,20,70,.06);
    --tap:2.75rem;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#130c26; --surface:#1d1533; --surface2:#251b40; --border:#332857;
      --text:#ece7f7; --muted:#a79ec2; --faint:#8b83a6;
      --accent:#bda4f7; --accent-ink:#1a1030; --accent-weak:#2b2250;
      --ok:#7ed3a2; --ok-bg:#14311f; --ok-bd:#2e6442;
      --warn:#e8c273; --warn-bg:#2c2210; --warn-bd:#57451c;
      --bad:#ec9aa3; --bad-bg:#34191d; --bad-bd:#74323b;
      --shadow:0 1px 2px rgba(0,0,0,.35),0 6px 20px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="light"]{
    --bg:#faf8ff; --surface:#ffffff; --surface2:#f4f0fc; --border:#e4ddf3;
    --text:#241a3a; --muted:#6b6480; --faint:#8c85a0;
    --accent:#5b3fa8; --accent-ink:#ffffff; --accent-weak:#ece6fb;
    --ok:#1c6f47; --ok-bg:#e4f5ec; --ok-bd:#a6d8bd;
    --warn:#8a5500; --warn-bg:#fdf2dd; --warn-bd:#eed3a0;
    --bad:#a8323c; --bad-bg:#fbe4e7; --bad-bd:#efb2b9;
    --shadow:0 1px 2px rgba(40,20,70,.05),0 6px 20px rgba(40,20,70,.06);
  }
  :root[data-theme="dark"]{
    --bg:#130c26; --surface:#1d1533; --surface2:#251b40; --border:#332857;
    --text:#ece7f7; --muted:#a79ec2; --faint:#8b83a6;
    --accent:#bda4f7; --accent-ink:#1a1030; --accent-weak:#2b2250;
    --ok:#7ed3a2; --ok-bg:#14311f; --ok-bd:#2e6442;
    --warn:#e8c273; --warn-bg:#2c2210; --warn-bd:#57451c;
    --bad:#ec9aa3; --bad-bg:#34191d; --bad-bd:#74323b;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 6px 20px rgba(0,0,0,.4);
  }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,-apple-system,sans-serif;
    font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums}
  input,select,button,textarea{font:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .wrap{max-width:34rem;margin:0 auto;padding:1rem 1rem 6rem;display:flex;flex-direction:column;gap:1rem}
  #panel{display:flex;flex-direction:column;gap:.85rem}

  header h1{font-size:1.15rem;margin:0;letter-spacing:-.01em}
  header p{margin:.15rem 0 0;color:var(--muted);font-size:.82rem}

  /* 앱 고르기 — 탭이 아니라 현황 카드가 곧 탭이다 */
  .apps{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
  .appcard{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border);
    border-radius:.8rem;padding:.7rem .8rem;box-shadow:var(--shadow);text-align:left;
    display:flex;flex-direction:column;gap:.4rem;cursor:pointer;min-height:var(--tap)}
  .appcard.active{border-color:var(--accent);border-left-color:var(--accent);background:var(--accent-weak)}
  .appcard.s-done{border-left-color:var(--ok)}
  .appcard.s-count{border-left-color:var(--warn)}
  .appcard.s-need{border-left-color:var(--bad)}
  .appcard .nm{font-weight:800;font-size:.95rem}
  .appcard .sub{color:var(--muted);font-size:.75rem}
  .bar{height:5px;border-radius:99px;background:var(--surface2);overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--accent);border-radius:99px}
  .appcard.s-done .bar>i{background:var(--ok)}

  /* 큰 상태판 — 폰에서 맨 먼저 눈에 들어와야 하는 것 */
  .board{border-radius:.9rem;padding:.9rem 1rem;background:var(--surface2);border:1.5px solid var(--border);box-shadow:var(--shadow)}
  .board.done{background:var(--ok-bg);border-color:var(--ok-bd)}
  .board.count{background:var(--warn-bg);border-color:var(--warn-bd)}
  .board.need{background:var(--bad-bg);border-color:var(--bad-bd)}
  .board .big{font-size:1.3rem;font-weight:800;line-height:1.35;text-wrap:balance}
  .board .hot{color:var(--bad)}
  .board.done .hot{color:var(--ok)}
  .board.count .hot{color:var(--warn)}
  .board p{margin:.3rem 0 0;font-size:.85rem}
  .board .dim{color:var(--muted);font-size:.8rem}

  .linkrow{display:flex;gap:.5rem;align-items:center;background:var(--surface);border:1px solid var(--border);
    border-radius:.7rem;padding:.5rem .6rem;font-size:.78rem}
  .linkrow code{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}

  .btn{background:var(--accent);color:var(--accent-ink);border:0;border-radius:.6rem;
    padding:0 .9rem;min-height:var(--tap);cursor:pointer;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:.35rem}
  .btn.ghost{background:var(--surface);color:var(--accent);border:1px solid var(--border);font-weight:600}
  .btn.sm{min-height:2.25rem;padding:0 .7rem;font-size:.82rem;border-radius:.5rem}

  .sechead{display:flex;align-items:baseline;justify-content:space-between;gap:.5rem;margin:.4rem 0 -.3rem}
  .sechead h2{font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0}
  .sechead .cnt{font-size:.78rem;color:var(--faint)}

  /* 사람 하나 = 카드 하나 */
  .people{display:flex;flex-direction:column;gap:.6rem}
  .person{background:var(--surface);border:1px solid var(--border);border-radius:.8rem;
    padding:.7rem .8rem;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:.55rem}
  .person.is-left{opacity:.55}
  .ptop{display:flex;align-items:flex-start;gap:.5rem}
  .pid{flex:1;min-width:0}
  .pid .pname{font-weight:700;display:block;width:100%;border:1px solid transparent;background:transparent;
    border-radius:.4rem;padding:.15rem .3rem;margin:-.15rem 0 0 -.3rem}
  .pid .pmail{display:block;width:100%;border:1px solid transparent;background:transparent;color:var(--muted);
    font-size:.78rem;border-radius:.4rem;padding:.1rem .3rem;margin-left:-.3rem;text-overflow:ellipsis}
  .pid input:focus{border-color:var(--accent);background:var(--surface2)}
  .keep{font-weight:800;font-size:.85rem;white-space:nowrap;color:var(--muted);padding-top:.15rem}
  .keep.hit{color:var(--ok)}
  .del{background:transparent;border:0;color:var(--faint);cursor:pointer;padding:.25rem .35rem;border-radius:.4rem;line-height:1}
  .del:hover{color:var(--bad);background:var(--bad-bg)}

  /* 상태 3칸 — 체크는 이 한 번의 톡으로 끝난다 */
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;background:var(--surface2);
    border-radius:.6rem;padding:.25rem}
  .seg button{border:0;background:transparent;border-radius:.45rem;min-height:2.4rem;cursor:pointer;
    font-size:.82rem;font-weight:700;color:var(--muted)}
  .seg button[aria-pressed="true"]{background:var(--surface);box-shadow:var(--shadow);color:var(--text)}
  .seg button[data-s="in"][aria-pressed="true"]{color:var(--ok)}
  .seg button[data-s="left"][aria-pressed="true"]{color:var(--bad)}

  .pdate{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--muted)}
  .pdate input[type="date"]{border:1px solid var(--border);background:var(--surface2);border-radius:.45rem;
    padding:.35rem .5rem;min-height:2.25rem;font-size:.82rem}
  .pmemo{width:100%;border:1px dashed var(--border);background:transparent;border-radius:.45rem;
    padding:.35rem .5rem;font-size:.8rem;color:var(--muted);min-height:2.25rem}

  form.add{display:grid;gap:.5rem;background:var(--surface);border:1px solid var(--border);
    border-radius:.8rem;padding:.8rem;box-shadow:var(--shadow)}
  form.add input{border:1px solid var(--border);background:var(--surface2);border-radius:.5rem;
    padding:.5rem .6rem;min-height:var(--tap);width:100%}

  .note{background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:.7rem;padding:.7rem .85rem;font-size:.8rem}
  .note b{color:var(--text)}
  .note ul{margin:.4rem 0 0;padding-left:1.1rem}
  .note li+li{margin-top:.25rem}

  footer{border-top:1px solid var(--border);padding-top:.9rem;color:var(--muted);font-size:.8rem;display:flex;flex-direction:column;gap:.6rem}
  .saved{margin:0;font-weight:700;color:var(--muted)}
  .saved:empty{display:none}
  .saved.bad{color:var(--bad);background:var(--bad-bg);border:1px solid var(--bad-bd);
    border-radius:.6rem;padding:.55rem .7rem;font-weight:800}
  footer .row{display:flex;flex-wrap:wrap;gap:.4rem}

  /* PC에서는 읽기만 — 두 기기에서 따로 체크하면 어느 쪽이 맞는지 알 수 없어진다 */
  .lockbar{display:none;background:var(--accent-weak);border:1px solid var(--border);border-radius:.8rem;
    padding:.8rem .9rem;font-size:.85rem;flex-direction:column;gap:.55rem}
  body.ro .lockbar{display:flex}
  body.ro form.add{display:none}
  body.ro .seg button,body.ro .del{pointer-events:none;opacity:.6}
  body.ro .pid input,body.ro .pmemo,body.ro .pdate input{pointer-events:none;border-color:transparent;background:transparent}

  .toast{position:fixed;left:50%;bottom:1.1rem;transform:translate(-50%,1rem);background:var(--text);color:var(--bg);
    padding:.55rem .9rem;border-radius:.55rem;font-size:.85rem;font-weight:600;opacity:0;pointer-events:none;
    transition:opacity .18s,transform .18s;z-index:9;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  .modal{position:fixed;inset:0;background:rgba(18,10,32,.6);display:flex;align-items:flex-end;justify-content:center;padding:0;z-index:20}
  .modal[hidden]{display:none}
  .mbox{background:var(--surface);border-top:1px solid var(--border);border-radius:1rem 1rem 0 0;
    width:100%;max-width:34rem;max-height:88vh;overflow:auto;padding:1rem 1rem 1.25rem;display:flex;flex-direction:column;gap:.7rem}
  .mtitle{font-weight:800;font-size:1rem}
  .mbody p{margin:0 0 .5rem;font-size:.85rem}
  .mbody .mdim{color:var(--muted);font-size:.8rem}
  .mact{flex-wrap:wrap}
  .mbody textarea{width:100%;min-height:9rem;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:.78rem;border:1px solid var(--border);border-radius:.5rem;background:var(--surface2);padding:.6rem}
  .mact{display:flex;justify-content:flex-end;gap:.5rem}

  @media (min-width:40rem){
    .wrap{max-width:42rem;padding-bottom:3rem}
    .modal{align-items:center;padding:1.25rem}
    .mbox{border-radius:1rem;border:1px solid var(--border)}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="wrap">
  <header>
    <h1>테스터 관리 · SYA 앱</h1>
    <p>구글 요건 — 앱마다 <b>12명이 14일 연속</b> 참여해야 정식 출시를 신청할 수 있어요.</p>
  </header>

  <div class="lockbar" id="lockbar">
    <div><b>💻 PC에서는 보기만 됩니다.</b><br>체크는 폰에서만 하기로 했어요. 표가 기기마다 따로 저장돼서, 두 곳에서 체크하면 어느 쪽이 맞는지 알 수 없어집니다.</div>
    <div class="row" style="display:flex;gap:.4rem;flex-wrap:wrap">
      <button class="btn sm" data-act="unlock">그래도 이 PC에서 수정하기</button>
    </div>
  </div>

  <div class="apps" id="apps"></div>
  <section id="panel"></section>

  <footer>
    <p id="savedline" class="saved"></p>
    <p><b>이 표는 지금 보고 있는 기기에만 저장돼요.</b> 이 페이지 자체에는 명단이 들어 있지 않고, 테스터 이름·메일은 인터넷에 올라가지 않습니다.</p>
    <div class="row">
      <button class="btn ghost sm" data-act="exportfile">📤 파일로 내보내기</button>
      <button class="btn ghost sm" data-act="importfile">📥 파일에서 불러오기</button>
      <button class="btn ghost sm" data-act="export">텍스트로 복사</button>
      <button class="btn ghost sm" data-act="import">텍스트 붙여넣기</button>
    </div>
    <div class="row">
      <button class="btn ghost sm" data-act="copyfrom">↔️ 다른 앱에서 가져오기</button>
      <button class="btn ghost sm" data-act="wipe">이 앱 표 비우기</button>
    </div>
    <input type="file" id="fileimp" accept=".json,application/json,text/plain" hidden>
  </footer>
</div>

<div class="toast" id="toast"></div>
<div class="modal" id="modal" hidden>
  <div class="mbox" role="dialog" aria-modal="true">
    <div class="mtitle" id="mtitle"></div>
    <div class="mbody" id="mbody"></div>
    <div class="mact" id="mact"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var KEY='sya.testers.v4';
  var PCEDIT='sya.testers.pcedit';
  var db;

  /* **여기에는 명단을 넣지 않는다.** 이 페이지는 공개 주소에 있어서, 명단을 박아 두면
     주소를 아는 사람 누구나 테스터들의 지메일을 보게 된다. 표는 빈 채로 시작하고,
     명단은 폰에서 한 번 "붙여넣기로 불러오기" 하면 그 뒤로 이 폰에만 남는다. */
  function roster(){ return []; }

  /* 열 때 저장된 것이 있었는가. 없어서 기본 명단으로 시작했다면 이 값이 true 가 된다.
     **이걸 화면에 보여 준다.** 브라우저가 저장을 막으면(사파리의 iframe 제한, 시크릿 창 등)
     체크한 것이 조용히 사라지는데, 조용히 사라지는 것이 가장 나쁘다 — 다 해 놓고
     다음 날 처음부터 다시 하게 된다. 저장이 됐는지 안 됐는지를 늘 말해 준다. */
  var FRESH=false, SAVE_ERR='';

  function load(){
    var raw=null;
    try{ raw=localStorage.getItem(KEY); }catch(e){ SAVE_ERR=e.message||'저장소를 열 수 없음'; }
    try{ db=raw?JSON.parse(raw):null; }catch(e){ db=null; }
    if(!db||!Array.isArray(db.apps)){
      FRESH=true;
      db={active:0, apps:[
        {app:'나란히',  pkg:'app.sya.reading_log', rows:roster()},
        {app:'사랑나라', pkg:'com.sya.sarangnara',  rows:roster()}
      ]};
    }
    if(db.active>=db.apps.length) db.active=0;
  }

  function save(){
    db.savedAt=new Date().toISOString();
    try{
      localStorage.setItem(KEY, JSON.stringify(db));
      // 정말 들어갔는지 되읽어 확인한다. 쓰기는 되는데 안 남는 브라우저가 있다.
      if(localStorage.getItem(KEY)) { SAVE_ERR=''; FRESH=false; }
      else SAVE_ERR='저장한 내용이 되읽히지 않음';
    }catch(e){ SAVE_ERR=e.message||'저장이 막혀 있음'; }
    render();
  }

  function savedLabel(){
    if(SAVE_ERR) return '⛔ 이 브라우저가 저장을 막고 있어요 — 나가면 사라집니다';
    if(FRESH) return '⚠️ 저장된 내용이 없어 기본 명단으로 시작했어요';
    if(!db.savedAt) return '';
    var d=new Date(db.savedAt);
    var same=fmt(d)===fmt(new Date());
    return '💾 마지막 저장 · '+(same?'오늘':fmt(d))+' '
      +String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  function cur(){ return db.apps[db.active]; }

  /* 폰에서만 수정. 손가락(coarse)이거나 화면이 좁으면 폰으로 본다.
     PC에서도 꼭 고쳐야 하면 잠금바의 버튼으로 이 기기만 풀 수 있다. */
  function editable(){
    if(localStorage.getItem(PCEDIT)==='1') return true;
    try{ if(window.matchMedia('(pointer: coarse)').matches) return true; }catch(e){}
    return window.innerWidth<=900;
  }

  function midnight(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
  function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function daysSince(iso){ if(!iso) return null; return Math.floor((midnight()-new Date(iso+'T00:00:00'))/86400000); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function calc(rows){
    var ins=rows.filter(function(r){return r.state==='in';});
    var asks=rows.filter(function(r){return r.state==='ask';});
    if(ins.length<12) return {kind:'need', in:ins.length, need:12-ins.length, ask:asks.length};
    var dates=ins.map(function(r){return r.since;}).filter(Boolean).sort();
    var base=dates[11]||dates[dates.length-1];
    var days=base?daysSince(base):0;
    var left=Math.max(0,14-days);
    var target=base?new Date(new Date(base+'T00:00:00').getTime()+14*86400000):null;
    return {kind:left===0?'done':'count', in:ins.length, days:days, left:left, base:base, target:target};
  }

  var toastT;
  function toast(msg){
    var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); },1800);
  }

  function renderApps(){
    document.getElementById('apps').innerHTML=db.apps.map(function(a,i){
      var c=calc(a.rows);
      var cls=c.kind==='done'?'s-done':c.kind==='count'?'s-count':'s-need';
      var sub=c.kind==='done'?'14일 채움 · 신청 가능'
             :c.kind==='count'?('참여 '+c.in+'명 · '+c.days+'/14일')
             :('참여 '+c.in+' / 12명');
      var pct=Math.min(100,Math.round(c.in/12*100));
      return '<button class="appcard '+cls+(i===db.active?' active':'')+'" data-act="tab" data-i="'+i+'">'
        +'<span class="nm">'+esc(a.app)+'</span>'
        +'<span class="bar"><i style="width:'+pct+'%"></i></span>'
        +'<span class="sub num">'+sub+'</span></button>';
    }).join('');
  }

  function boardHTML(c){
    if(c.kind==='need') return '<div class="big">참여 '+c.in+'명 · <span class="hot">'+c.need+'명 더</span></div>'
      +'<p>12명이 <b>동시에</b> 참여 중이어야 14일 세기가 시작돼요.</p>'
      +'<p class="dim">한 명만 빠져도 처음부터라, 12명보다 <b>15~16명</b>을 모으는 편이 안전해요.</p>';
    if(c.kind==='done') return '<div class="big">✅ 14일 채웠어요</div>'
      +'<p>참여 '+c.in+'명, '+c.days+'일째 유지 중.</p>'
      +'<p class="dim">Play Console → 대시보드 → 프로덕션 액세스 신청. 검토는 보통 7일 이내.</p>';
    return '<div class="big num">'+c.days+'일째 / 14일 · <span class="hot">'+c.left+'일 남음</span></div>'
      +'<p>참여 <b>'+c.in+'명</b> · 12명 채운 날 '+c.base+'</p>'
      +'<p class="dim num">신청 가능일 <b>'+fmt(c.target)+'</b> — 그 전에 12명 밑으로 떨어지면 다시 셉니다.</p>';
  }

  function personHTML(t,i){
    var days=t.state==='in'?daysSince(t.since):null;
    var keep=days===null?'':('<span class="keep'+(days>=14?' hit':'')+'">'+days+'일'+(days>=14?' ✅':'')+'</span>');
    var seg=['ask','in','left'].map(function(s){
      var label=s==='ask'?'연락함':s==='in'?'참여 중':'이탈';
      return '<button type="button" data-act="state" data-i="'+i+'" data-s="'+s+'" aria-pressed="'+(t.state===s)+'">'+label+'</button>';
    }).join('');
    var date=t.state==='in'
      ? '<div class="pdate"><span>참여한 날</span><input type="date" data-act="edit" data-f="since" data-i="'+i+'" value="'+esc(t.since||'')+'"></div>'
      : '';
    return '<div class="person'+(t.state==='left'?' is-left':'')+'">'
      +'<div class="ptop"><span class="pid">'
        +'<input class="pname" data-act="edit" data-f="name" data-i="'+i+'" value="'+esc(t.name)+'" placeholder="이름" aria-label="이름">'
        +'<input class="pmail" data-act="edit" data-f="mail" data-i="'+i+'" value="'+esc(t.mail)+'" placeholder="gmail" aria-label="지메일" inputmode="email">'
      +'</span>'+keep
      +'<button class="del" data-act="delrow" data-i="'+i+'" aria-label="지우기">✕</button></div>'
      +'<div class="seg">'+seg+'</div>'
      +date
      +'<input class="pmemo" data-act="edit" data-f="memo" data-i="'+i+'" value="'+esc(t.memo||'')+'" placeholder="메모 (관계·기기)" aria-label="메모">'
    +'</div>';
  }

  function renderPanel(){
    var a=cur(), c=calc(a.rows);
    var link=a.pkg
      ? '<div class="linkrow"><code>play.google.com/apps/testing/'+esc(a.pkg)+'</code>'
        +'<button class="btn ghost sm" data-act="copy">링크 복사</button></div>'
      : '';
    var people=a.rows.length
      ? a.rows.map(personHTML).join('')
      : '<div class="person"><p style="margin:0;color:var(--muted)">아직 명단이 없어요. 맨 아래 “텍스트 붙여넣기”나 “파일에서 불러오기”로 한 번만 넣으면 이 폰에 남아요.</p></div>';

    document.getElementById('panel').innerHTML=
      '<div class="board '+c.kind+'">'+boardHTML(c)+'</div>'
      +link
      +'<div class="sechead"><h2>테스터</h2><span class="cnt num">'+a.rows.length+'명</span></div>'
      +'<div class="people">'+people+'</div>'
      +'<form class="add" data-act="addform">'
        +'<input name="name" placeholder="이름" required>'
        +'<input name="mail" type="email" inputmode="email" placeholder="플레이스토어에 로그인된 Gmail" required>'
        +'<button class="btn" type="submit">테스터 추가</button>'
      +'</form>'
      +'<div class="note"><b>⚠️ 흔한 사고 두 가지</b><ul>'
        +'<li>테스터가 <b>“테스터 나가기”</b>를 누르면 그 사람은 처음부터예요. 합쳐서 14일은 인정 안 됩니다.</li>'
        +'<li>알려준 Gmail이 <b>그 폰에 로그인된 계정</b>과 다르면 링크가 아예 안 열려요.</li>'
      +'</ul></div>';
  }

  function render(){
    document.body.classList.toggle('ro', !editable());
    renderApps(); renderPanel();
    var line=document.getElementById('savedline');
    line.textContent=savedLabel();
    line.className='saved'+((SAVE_ERR||FRESH)?' bad':'');
  }

  document.addEventListener('click', function(e){
    var el=e.target.closest('[data-act]'); if(!el) return;
    var act=el.getAttribute('data-act');

    if(act==='tab'){ db.active=+el.getAttribute('data-i'); save(); }
    else if(act==='unlock'){ try{ localStorage.setItem(PCEDIT,'1'); }catch(err){} render(); toast('이 PC에서도 수정할 수 있어요'); }
    else if(act==='state'){
      var i=+el.getAttribute('data-i'), s=el.getAttribute('data-s'), row=cur().rows[i];
      row.state=s;
      if(s==='in' && !row.since) row.since=fmt(midnight());
      save();
    }
    else if(act==='delrow'){
      var di=+el.getAttribute('data-i'), t=cur().rows[di];
      confirmBox((t.name||t.mail||'이 사람')+' 님을 표에서 지울까요?', function(){ cur().rows.splice(di,1); save(); });
    }
    else if(act==='copy'){ copyText('https://play.google.com/apps/testing/'+cur().pkg,'링크를 복사했어요'); }
    else if(act==='copyfrom'){ copyFromOther(); }
    else if(act==='wipe'){
      confirmBox('“'+cur().app+'” 표를 전부 비웁니다. 되돌릴 수 없어요.', function(){ cur().rows=[]; save(); toast('비웠어요'); });
    }
    else if(act==='exportfile'){ saveFile('sya-테스터-'+fmt(new Date())+'.json', JSON.stringify(db,null,2)); }
    else if(act==='importfile'){ document.getElementById('fileimp').click(); }
    else if(act==='export'){ exportText(JSON.stringify(db,null,2)); }
    else if(act==='import'){
      showModal('붙여넣어 불러오기',
        '<p>다른 기기에서 복사한 내용을 붙여넣으세요. 전체 백업이면 통째로 바뀌고, 한 앱 명단이면 지금 앱만 채웁니다.</p>'
        +'<textarea id="impta" placeholder="여기에 붙여넣기"></textarea>',
        [{label:'취소',ghost:true,onClick:hideModal},
         {label:'불러오기',onClick:function(){ applyImport(document.getElementById('impta').value); }}]);
    }
  });

  document.addEventListener('change', function(e){
    var el=e.target.closest('[data-act="edit"]'); if(!el) return;
    var i=+el.getAttribute('data-i'), f=el.getAttribute('data-f');
    cur().rows[i][f]=el.value; save();
  });

  document.addEventListener('submit', function(e){
    var form=e.target.closest('[data-act="addform"]'); if(!form) return;
    e.preventDefault();
    var d=new FormData(form);
    var name=(d.get('name')||'').trim(), mail=(d.get('mail')||'').trim();
    if(!name||!mail) return;
    cur().rows.push({name:name,mail:mail,memo:'',state:'ask',since:''});
    save(); toast(name+' 님을 더했어요');
  });

  /* 한쪽 앱에 해 둔 것을 다른 앱으로 옮긴다. 같은 사람들에게 두 앱을 함께 부탁하므로
     이름·메일·메모를 두 번 치는 것은 낭비다.

     **상태까지 옮기는 것은 기본이 아니다.** 옵트인은 앱마다 따로 세기 때문에,
     나란히에만 참여한 사람이 사랑나라에서도 '참여 중'으로 보이면 D-day 가 실제보다
     빨리 차오른다 — 그 숫자를 믿고 프로덕션을 신청하면 구글이 되돌려보낸다.
     그래서 「명단만」과 「상태까지」를 나눠 묻고, 무엇이 위험한지 그 자리에서 말한다. */
  function copyFromOther(){
    if(db.apps.length<2){ toast('가져올 다른 앱이 없어요'); return; }
    var srcIndex=(db.active+1)%db.apps.length;
    var src=db.apps[srcIndex], dst=cur();
    var ins=src.rows.filter(function(r){return r.state==='in';}).length;

    function apply(withState){
      dst.rows=src.rows.map(function(r){
        return {
          name:r.name, mail:r.mail, memo:r.memo||'',
          state:withState?r.state:'ask',
          since:withState?(r.since||''):''
        };
      });
      hideModal(); save();
      toast(src.rows.length+'명을 '+(withState?'상태까지 ':'명단만 ')+'가져왔어요');
    }

    showModal('“'+src.app+'”에서 가져오기',
      '<p><b>'+esc(src.app)+'</b> 표의 <b>'+src.rows.length+'명</b>을 <b>'+esc(dst.app)+'</b>으로 복사합니다. '
      +'지금 '+esc(dst.app)+' 표('+dst.rows.length+'명)는 지워집니다.</p>'
      +'<p class="mdim">'+esc(src.app)+'에서 <b>참여 중</b>인 사람은 '+ins+'명이에요. '
      +'옵트인은 앱마다 따로 세니, 두 앱 모두 참여한 것이 <b>확실할 때만</b> “상태까지”를 고르세요. '
      +'확실하지 않으면 명단만 가져와서 폰으로 하나씩 체크하는 편이 안전합니다.</p>',
      [{label:'취소',ghost:true,onClick:hideModal},
       {label:'명단만',ghost:true,onClick:function(){ apply(false); }},
       {label:'상태까지',onClick:function(){ apply(true); }}]);
  }

  function copyText(str, okMsg){
    function legacy(){
      try{
        var ta=document.createElement('textarea'); ta.value=str;
        ta.style.position='fixed'; ta.style.top='-1000px'; document.body.appendChild(ta);
        ta.focus(); ta.select();
        var done=document.execCommand('copy'); document.body.removeChild(ta);
        toast(done?(okMsg||'복사했어요'):'직접 선택해 복사하세요');
      }catch(e){ toast('직접 선택해 복사하세요'); }
    }
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(str).then(function(){ toast(okMsg||'복사했어요'); }, legacy);
    } else legacy();
  }

  function blobDownload(fn,text){
    try{
      var blob=new Blob([text],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a'); a.href=url; a.download=fn;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ if(a.parentNode)a.parentNode.removeChild(a); URL.revokeObjectURL(url); },500);
      return true;
    }catch(e){ return false; }
  }
  function saveFile(fn,text){
    if(window.claude&&window.claude.downloads&&typeof window.claude.downloads.save==='function'){
      window.claude.downloads.save({filename:fn,data:text}).then(function(){ toast('백업 파일을 내려받았어요'); },
        function(err){
          if(err&&err.code==='declined'){ toast('저장을 취소했어요'); }
          else { toast('파일 저장이 막혀 있어요 — 텍스트로 보여 드릴게요'); exportText(text); }
        });
      return;
    }
    if(blobDownload(fn,text)) toast('백업 파일을 내려받았어요');
    else { toast('파일 저장이 막혀 있어요 — 텍스트로 보여 드릴게요'); exportText(text); }
  }
  function exportText(json){
    showModal('백업 텍스트',
      '<p>전부 복사해 다른 기기의 “텍스트 붙여넣기”에 넣으면 그대로 옮겨져요.</p>'
      +'<textarea id="expta" readonly>'+esc(json)+'</textarea>',
      [{label:'닫기',ghost:true,onClick:hideModal},
       {label:'복사',onClick:function(){ copyText(json,'복사했어요'); }}]);
    var ta=document.getElementById('expta'); if(ta){ ta.focus(); ta.select(); }
  }
  function applyImport(text){
    try{
      var data=JSON.parse(text);
      if(Array.isArray(data)){
        cur().rows=data.map(function(x){ return {name:x.name||'',mail:x.mail||'',memo:x.memo||'',state:x.state||'ask',since:x.since||''}; });
        hideModal(); save(); toast(data.length+'명을 불러왔어요');
      } else if(data&&Array.isArray(data.apps)){
        db=data; if(db.active>=db.apps.length) db.active=0;
        hideModal(); save(); toast('전체 백업을 불러왔어요');
      } else throw new Error('형식이 맞지 않아요');
    }catch(err){ toast('불러오지 못했어요 — '+err.message); }
  }

  var fileimp=document.getElementById('fileimp');
  fileimp.addEventListener('change', function(){
    var f=fileimp.files&&fileimp.files[0]; if(!f) return;
    var rd=new FileReader();
    rd.onload=function(){ applyImport(String(rd.result||'')); fileimp.value=''; };
    rd.onerror=function(){ toast('파일을 읽지 못했어요'); fileimp.value=''; };
    rd.readAsText(f);
  });

  function showModal(title, body, actions){
    var m=document.getElementById('modal');
    document.getElementById('mtitle').textContent=title;
    document.getElementById('mbody').innerHTML=body;
    var ma=document.getElementById('mact'); ma.innerHTML='';
    actions.forEach(function(a){
      var b=document.createElement('button');
      b.className='btn sm'+(a.ghost?' ghost':'');
      b.textContent=a.label; b.onclick=a.onClick;
      ma.appendChild(b);
    });
    m.hidden=false;
    var f=m.querySelector('textarea')||m.querySelector('button'); if(f) f.focus();
  }
  function hideModal(){ document.getElementById('modal').hidden=true; }
  function confirmBox(msg,onYes){
    showModal('확인','<p>'+esc(msg)+'</p>',
      [{label:'취소',ghost:true,onClick:hideModal},
       {label:'예',onClick:function(){ hideModal(); onYes(); }}]);
  }
  document.getElementById('modal').addEventListener('click', function(e){ if(e.target.id==='modal') hideModal(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') hideModal(); });
  window.addEventListener('resize', function(){ document.body.classList.toggle('ro', !editable()); });

  load(); render();
})();
</script>

</body>
</html>
