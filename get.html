<!DOCTYPE html>
<!--
  나란히 받기 페이지 — 친구에게 앱을 권할 때 보내는 링크(공개).

  앱·웹의 "앱 추천하기" 가 이 주소(AppInfo.getUrl) 하나를 공유 시트로 보낸다.
  친구는 여기서 자기 기기를 고른다:
    - 갤럭시(안드로이드) → 구글 플레이 스토어
    - 아이폰            → 웹으로 열고 "홈 화면에 추가"

  **아이폰 앱이 나오면**: 아래 IOS_URL 을 App Store 주소로만 바꾸면 된다(그 한 곳).
  **플레이 출시 전**: 플레이 주소는 아직 열리지 않는다. 그래서 누구나 지금 바로
  쓸 수 있는 "웹으로 바로 시작" 을 함께 둔다.

  privacy.html·delete-account.html 과 같은 자리(스타일도 같은 레몬크림·잉크).
  `flutter build web` 이 그대로 복사하므로 배포 한 번이면 아래로 공개된다.
      https://sya-apps.github.io/naranhi/get.html
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>나란히 받기</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <style>
    :root {
      --cream: #FBF3D6;
      --paper: #FFFDF5;
      --ink: #4A3B36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px 18px 72px;
      background: var(--cream);
      color: var(--ink);
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo",
                   "Malgun Gothic", sans-serif;
      line-height: 1.7;
      word-break: keep-all;
      text-align: center;
    }
    main { max-width: 420px; margin: 0 auto; }
    .icon {
      width: 96px; height: 96px;
      border-radius: 22px;
      border: 1.5px solid var(--ink);
      display: block; margin: 0 auto 18px;
    }
    h1 { font-size: 1.7rem; margin: 0 0 4px; }
    .sub { color: rgba(74, 59, 54, .65); margin: 0 0 32px; }
    a.btn {
      display: flex; align-items: center; gap: 14px;
      text-align: left;
      text-decoration: none;
      color: var(--ink);
      background: var(--paper);
      border: 1.5px solid var(--ink);
      border-radius: 16px;
      padding: 16px 20px;
      margin: 0 0 14px;
    }
    a.btn:active { transform: translateY(1px); }
    .btn .emoji { font-size: 1.7rem; line-height: 1; }
    .btn .label { font-weight: 700; font-size: 1.05rem; }
    .btn .note { color: rgba(74, 59, 54, .6); font-size: .82rem; }
    .btn .col { display: flex; flex-direction: column; }
    .web {
      display: inline-block; margin-top: 8px;
      color: #7A5C50; font-weight: 700; text-decoration: none;
      border-bottom: 1.5px solid rgba(122, 92, 80, .4);
    }
    .foot {
      margin-top: 30px; font-size: .85rem;
      color: rgba(74, 59, 54, .6);
    }
    .ios-tip {
      margin-top: 22px; font-size: .85rem;
      color: rgba(74, 59, 54, .7);
      background: var(--paper);
      border: 1px solid rgba(74, 59, 54, .18);
      border-radius: 12px; padding: 12px 16px; text-align: left;
    }
  </style>
</head>
<body>
<main>
  <img class="icon" src="icons/Icon-192.png" alt="나란히 아이콘">
  <h1>나란히</h1>
  <p class="sub">함께 쓰는 독서 책장</p>

  <!-- 갤럭시(안드로이드) → 구글 플레이. 출시 전에는 열리지 않는다. -->
  <a class="btn" href="https://play.google.com/store/apps/details?id=app.sya.reading_log">
    <span class="emoji">🤖</span>
    <span class="col">
      <span class="label">갤럭시 · 안드로이드</span>
      <span class="note">구글 플레이 스토어에서 받기</span>
    </span>
  </a>

  <!-- 아이폰 → 웹으로. iOS 앱이 나오면 이 href 만 App Store 주소로 바꾼다. -->
  <a class="btn" href="./">
    <span class="emoji">🍎</span>
    <span class="col">
      <span class="label">아이폰</span>
      <span class="note">웹으로 열고 홈 화면에 추가</span>
    </span>
  </a>

  <a class="web" href="./">기기 상관없이 · 웹으로 바로 시작하기 →</a>

  <div class="ios-tip">
    <strong>아이폰에서 앱처럼 쓰기</strong><br>
    사파리로 열고 아래 <strong>공유</strong> 버튼 → <strong>홈 화면에 추가</strong> 를
    누르면, 나란히 아이콘이 홈 화면에 생겨요.
  </div>

  <p class="foot">읽은 책을 책장에 꽂고, 오늘 진도를 친구와 나눠요.</p>
</main>
</body>
</html>
